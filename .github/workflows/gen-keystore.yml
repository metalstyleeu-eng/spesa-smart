name: Genera chiave di firma (una volta sola)

# Esegui MANUALMENTE da Actions -> "Genera chiave di firma" -> Run workflow.
# Crea una chiave di firma stabile e la salva come artifact "keystore-b64".
# Poi: scarica l'artifact, apri il file, copia tutto il contenuto e salvalo come
# Secret del repository chiamato  KEYSTORE_B64  (Settings -> Secrets and variables
# -> Actions -> New repository secret). Da quel momento ogni APK sarà firmato con
# questa chiave e gli aggiornamenti si installeranno sopra il vecchio.

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Genera keystore
        run: |
          keytool -genkeypair -v -keystore release.keystore -alias spesasmart \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass spesasmart -keypass spesasmart \
            -dname "CN=Spesa Smart, OU=App, O=Spesa Smart, L=Citta, ST=Italia, C=IT"
          base64 -w0 release.keystore > keystore.b64
          echo "::notice::Keystore creato. Scarica l'artifact 'keystore-b64', copia il contenuto del file e salvalo come Secret del repo: KEYSTORE_B64"

      - name: Carica come artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-b64
          path: keystore.b64
          if-no-files-found: error
