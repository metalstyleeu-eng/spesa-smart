name: Build APK

# Si avvia a ogni push su main, oppure manualmente dalla scheda "Actions".
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Secret con la chiave di firma (base64). Se presente -> APK "release" firmato
      # sempre con la STESSA chiave (gli aggiornamenti si installano sopra il vecchio).
      # Se assente -> APK debug (come prima). Vedi gen-keystore.yml.
      KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
      KEYSTORE_PASS: spesasmart
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Bundle OCR offline (Tesseract)
        run: npm run setup

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      # --- Caso A: chiave di firma presente -> APK release firmato (stabile) ---
      - name: Build & sign release APK
        if: env.KEYSTORE_B64 != ''
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]' | base64 -d > release.keystore
          BT="$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)"
          "$BT/zipalign" -f 4 app/build/outputs/apk/release/app-release-unsigned.apk app-aligned.apk
          "$BT/apksigner" sign --ks release.keystore \
            --ks-pass pass:$KEYSTORE_PASS --key-pass pass:$KEYSTORE_PASS \
            --out app-release.apk app-aligned.apk
          rm -f release.keystore

      - name: Upload APK (release firmato)
        if: env.KEYSTORE_B64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: SpesaSmart-APK
          path: android/app-release.apk
          if-no-files-found: error

      # --- Caso B: nessuna chiave -> APK debug (ripiego) ---
      - name: Build debug APK
        if: env.KEYSTORE_B64 == ''
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK (debug)
        if: env.KEYSTORE_B64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: SpesaSmart-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
