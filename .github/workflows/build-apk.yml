name: Build APK

# Si avvia a ogni push su main, oppure manualmente dalla scheda "Actions".
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Secret con la chiave di firma (base64). Se presente -> APK "release" firmato
      # sempre con la STESSA chiave (gli aggiornamenti si installano sopra il vecchio).
      # Se assente -> APK debug (come prima). Vedi gen-keystore.yml.
      KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
      KEYSTORE_PASS: spesasmart
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Bundle OCR offline (Tesseract)
        run: npm run setup

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      # Prepara la chiave di firma: prima il file nel repo (signing/keystore.b64),
      # altrimenti il secret KEYSTORE_B64. signed=true se ne abbiamo una.
      - name: Prepara chiave di firma
        id: signing
        run: |
          if [ -f signing/keystore.b64 ]; then SRC="$(cat signing/keystore.b64)";
          elif [ -n "$KEYSTORE_B64" ]; then SRC="$KEYSTORE_B64";
          else SRC=""; fi
          if [ -n "$SRC" ]; then
            printf '%s' "$SRC" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      # --- Caso A: chiave presente -> APK release firmato (firma stabile) ---
      - name: Build & sign release APK
        if: steps.signing.outputs.signed == 'true'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          BT="$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)"
          "$BT/zipalign" -f 4 app/build/outputs/apk/release/app-release-unsigned.apk app-aligned.apk
          "$BT/apksigner" sign --ks "$RUNNER_TEMP/release.keystore" \
            --ks-pass pass:$KEYSTORE_PASS --key-pass pass:$KEYSTORE_PASS \
            --out app-release.apk app-aligned.apk

      - name: Upload APK (release firmato)
        if: steps.signing.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SpesaSmart-APK
          path: android/app-release.apk
          if-no-files-found: error

      # --- Caso B: nessuna chiave -> APK debug (ripiego) ---
      - name: Build debug APK
        if: steps.signing.outputs.signed != 'true'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK (debug)
        if: steps.signing.outputs.signed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SpesaSmart-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
